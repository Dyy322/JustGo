spring:
  application:
    name: JustGo-backend
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  datasource:
    url: jdbc:mysql://localhost:3306/JustGo?characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080

# MyBatis-Plus 框架配置
mybatis-plus:
  # Mapper XML 文件的位置，用于加载自定义 SQL 映射
  mapper-locations: classpath:mapper/*.xml
  # 实体类所在的包路径，用于在 XML 中简化类名引用
  type-aliases-package: com.dyu.justgobackend.entity

  # MyBatis 核心配置
  configuration:
    # 开启数据库下划线命名到 Java 驼峰命名的自动转换（如：user_name -> userName）
    map-underscore-to-camel-case: true
    # 配置 SQL 日志实现，将在控制台打印执行的 SQL 语句（仅开发环境使用）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  # MyBatis-Plus 全局策略配置
  global-config:
    # 数据库相关配置
    db-config:
      # 指定逻辑删除字段名称，配合实体类中的 @TableLogic 注解使用
      logic-delete-field: deletedAt
      # 逻辑删除时的更新值（标记为已删除）
      logic-delete-value: NOW()
      # 逻辑未删除时的值（标记为正常数据）
      logic-not-delete-value: NULL
      # 主键生成策略，使用数据库自增方式
      id-type: auto

# 应用自定义配置
app:
  # 跨域资源共享（CORS）配置，用于控制前端应用的访问权限
  cors:
    # 允许访问的前端域名列表
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
    # 允许的 HTTP 请求方法
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    # 允许的请求头，* 表示允许所有
    allowed-headers:
      - "*"
    # 是否允许携带认证信息（如 Cookie、Authorization 头）
    allow-credentials: true
    # 预检请求的缓存时间（秒），在此时间内浏览器不会重复发送 OPTIONS 请求
    max-age: 3600

  # JWT（JSON Web Token）安全配置
  jwt:
    # 生产环境请通过环境变量覆盖，长度建议不低于 32 字节。
    secret: ${JWT_SECRET:JustGoDevelopmentSecretKeyChangeMeInProduction}
    # JWT 签发者标识，用于验证 Token 来源
    issuer: JustGo-backend
    # Token 有效期，2h 表示 2 小时后过期
    expiration: 2h
    # Redis 中 jti 吊销集合键前缀（与业务 Redis key 命名空间区分）
    denylist-key-prefix: ${JWT_DENYLIST_PREFIX:jwt:denylist:}
